<div th:fragment="report">

    <div class="card">
        <div class="table-responsive">

            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th th:text="#{reports.currentUsers.table.header.name}">Подія</th>
                    <th th:text="#{reports.currentUsers.table.header.sessionId}">Сесія</th>
                    <th th:text="#{reports.currentUsers.table.header.sessionStartTime}" class="text-end">Початок сесії
                    </th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row : ${reportData}">
                    <td th:text="${row.name}">Назва помилки</td>
                    <td th:text="${row.sessionId}"><</td>
                    <td class="text-end" th:text="${row.sessionStartTime}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(reportData)}">
                    <td th:text="#{reports.empty}" colspan="3" class="text-center text-muted">Помилок не знайдено</td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>
