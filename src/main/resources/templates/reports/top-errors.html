<div th:fragment="report">
    <div id="currentFilters" class="row g-3">
        <div class="col-md-2">
            <label class="form-label small mb-1" th:text="#{reports.filter.from}">Період з</label>
            <input type="date" class="form-control form-control-sm" id="filterFrom" th:value="${from}">
        </div>
        <div class="col-md-2">
            <label class="form-label small mb-1" th:text="#{reports.filter.to}">по</label>
            <input type="date" class="form-control form-control-sm" id="filterTo" th:value="${to}">
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-sm btn-primary" onclick="refreshReportData('top-errors')" th:text="#{reports.btn.generate}">Сформувати</button>
        </div>
    </div>

    <div class="card">
        <div class="report-table-wrapper">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th th:text="#{reports.topErrors.table.header.event}">Подія</th>
                        <th th:text="#{reports.topErrors.table.header.level}">Рівень</th>
                        <th th:text="#{reports.topErrors.table.header.count}" class="text-end">Кількість помилок</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row : ${reportData.topErrors}">
                        <td th:text="${row.name}">Назва помилки</td>
                        <td><span class="badge bg-danger">Error / Critical</span></td>
                        <td class="text-end" th:text="${row.count}">0</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(reportData.topErrors)}">
                        <td th:text="#{reports.empty}" colspan="3" class="text-center text-muted">Помилок не знайдено</td>
                    </tr>
                    </tbody>
            </table>
        </div>
    </div>
</div>
