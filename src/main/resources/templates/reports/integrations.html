<div th:fragment="report">
    <div id="currentFilters" class="row g-3">
        <div class="col-md-2">
            <label class="form-label small mb-1" th:text="#{reports.filter.from}">Період з</label>
            <input type="date" class="form-control form-control-sm" id="filterFrom" th:value="${from}">
        </div>
        <div class="col-md-2">
            <label class="form-label small mb-1" th:text="#{reports.filter.to}">по</label>
            <input type="date" class="form-control form-control-sm" id="filterTo" th:value="${to}">
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-sm btn-primary" onclick="refreshReportData('integrations')" th:text="#{reports.btn.generate}">Сформувати</button>
        </div>
    </div>

    <div class="card">
        <div class="report-table-wrapper">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th th:text="#{reports.integrations.table.header.event}">Подія</th>
                    <th th:text="#{reports.integrations.table.header.start}">Дата початку</th>
                    <th th:text="#{reports.integrations.table.header.finish}">Дата завершення</th>
                    <th th:text="#{reports.integrations.table.header.duration}">Час виконання</th>
                </tr>
                </thead>
                <tbody>

                <tr th:each="row : ${reportData}">
                    <td th:text="${row.name}">Назва події</td>
                    <td th:text="${row.start}">Дата початку</td>
                    <td th:text="${row.end}">Дата завершення</td>
                    <td th:text="${row.duration}">0</td>
                </tr>

                <tr th:if="${#lists.isEmpty(reportData)}">
                    <td th:text="#{reports.empty}" colspan="4" class="text-center text-muted">Подій не знайдено</td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>
</div>
